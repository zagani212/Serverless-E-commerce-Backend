AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:

  addCreateItem:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: addCartItem.handler
      CodeUri: backend/Lambda/api/addCartItem.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !ImportValue ProductsArn 
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !ImportValue CartsArn
  processPayment:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: processPayment.handler
      CodeUri: backend/Lambda/api/processPayment.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !ImportValue CartsArn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !ImportValue PaymentsArn
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !ImportValue OrdersArn
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !ImportValue ProductsArn
  createOrder:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: createOrder.handler
      CodeUri: backend/Lambda/api/createOrder.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !ImportValue ProductsArn
            - Effect: Allow
              Action:
                - dynamodb:BatchGetItem
              Resource: !ImportValue ProductsArn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !ImportValue ProductsArn
            - Effect: Allow
              Action:
                -  lambda:InvokeAsync
              Resource: !GetAtt processPayment.Arn
  createProduct:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: createProduct.handler
      CodeUri: backend/Lambda/api/createProduct.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !ImportValue ProductsArn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !ImportValue BucketArn
  editUser:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: editUser.handler
      CodeUri: backend/Lambda/api/editUser.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !ImportValue UsersArn
  getAllProducts:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: getAllProducts.handler
      CodeUri: backend/Lambda/api/getAllProducts.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !ImportValue ProductsArn
  getCart:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: getCart.handler
      CodeUri: backend/Lambda/api/getCart.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !ImportValue CartsArn
  getOrders:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: getOrders.handler
      CodeUri: backend/Lambda/api/getOrders.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !ImportValue OrdersArn
  getProductById:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: getProductById.handler
      CodeUri: backend/Lambda/api/getProductById.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !ImportValue ProductsArn
  getUserById:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: getUserById.handler
      CodeUri: backend/Lambda/api/getUserById.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !ImportValue UsersArn
  getUsers:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: getUsers.handler
      CodeUri: backend/Lambda/api/getUsers.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !ImportValue UsersArn
  inventoryUpdate:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: inventoryUpdate.handler
      CodeUri: backend/Lambda/api/inventoryUpdate.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !ImportValue CartsArn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !ImportValue OrdersArn
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !ImportValue ProductsArn
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !ImportValue PaymentsArn
  removeCartItem:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: removeCartItem.handler
      CodeUri: backend/Lambda/api/removeCartItem.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !ImportValue CartsArn
  registerNewUsers:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: registerNewUsers.handler
      CodeUri: backend/Lambda/registerNewUsers.mjs
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !ImportValue UsersArn
  authLambda:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs24.x
      Handler: index.handler
      CodeUri: zip/auth-lambda.zip
      Tracing: Active
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !ImportValue UsersArn
            
            
Outputs:
  createOrder:
    Value: !GetAtt createOrder.Arn
    Export:
      Name: createOrder
  processPayment:
    Value: !GetAtt processPayment.Arn
    Export:
      Name: processPayment
  inventoryUpdate:
    Value: !GetAtt inventoryUpdate.Arn
    Export:
      Name: inventoryUpdate
  authLambda:
    Value: !GetAtt authLambda.Arn
    Export:
      Name: authLambda
  getCart:
    Value: !GetAtt getCart.Arn
    Export:
      Name: getCart
  addCreateItem:
    Value: !GetAtt addCreateItem.Arn
    Export:
      Name: addCreateItem
  removeCartItem:
    Value: !GetAtt removeCartItem.Arn
    Export:
      Name: removeCartItem
  getOrders:
    Value: !GetAtt getOrders.Arn
    Export:
      Name: getOrders
  getProductById:
    Value: !GetAtt getProductById.Arn
    Export:
      Name: getProductById
  createProduct:
    Value: !GetAtt createProduct.Arn
    Export:
      Name: createProduct
  getAllProducts:
    Value: !GetAtt getAllProducts.Arn
    Export:
      Name: getAllProducts
  getProductById:
    Value: !GetAtt getProductById.Arn
    Export:
      Name: getProductById
  getUsers:
    Value: !GetAtt getUsers.Arn
    Export:
      Name: getUsers
  editUser:
    Value: !GetAtt editUser.Arn
    Export:
      Name: editUser
  getUserById:
    Value: !GetAtt getUserById.Arn
    Export:
      Name: getUserById