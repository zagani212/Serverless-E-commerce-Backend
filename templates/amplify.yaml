AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  GitHubRepo:
    Type: String
    Description: GitHub repo URL (e.g. https://github.com/user/repo)

  GitHubToken:
      Type: String
      NoEcho: true
      Description: GitHub OAuth token

Resources:

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: e-commerce-amplify-app
      Repository: !Ref GitHubRepo
      AccessToken: !Ref GitHubToken
      CustomRules:
        - Source: /<*>
          Status: 404-200
          Target: /index.html
        - Source: </^[^.]+$|\\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|ttf|map|json)$)([^.]+$)/>
          Status: "200"
          Target: /index.html
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci --cache .npm --prefer-offline
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: dist
            files:
              - '**/*'
          cache:
            paths:
              - .npm/**/*
Outputs:
  AppId:
    Value: !GetAtt AmplifyApp.AppId
    Export:
      Name: AppId 


  DefaultDomain:
    Value: !GetAtt AmplifyApp.DefaultDomain
    Export:
      Name: DefaultDomain